server:
  port: 8080

spring:
  # === 默认使用 H2 内存数据库，零配置启动 ===
  # 如果你想用 MySQL，注释掉 h2 段，打开 mysql 段
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
    # === MySQL 配置（需要本地有 MySQL）===
    # url: jdbc:mysql://localhost:3306/user_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    # driver-class-name: com.mysql.cj.jdbc.Driver
    # username: root
    # password: root

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.demo.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl   # 打印 SQL 到控制台

logging:
  level:
    com.example.demo: DEBUG
